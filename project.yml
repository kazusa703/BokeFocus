name: BokeFocus
options:
  bundleIdPrefix: com.imaiissatsu
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"
  defaultConfig: Release
  groupSortPosition: top
  generateEmptyDirectories: true

# GoogleMobileAds: re-add after AdMob app is fully activated
# packages:
#   GoogleMobileAds:
#     url: https://github.com/googleads/swift-package-manager-google-mobile-ads
#     from: "12.0.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: WM7939G226
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: BokeFocus
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Choose photos to apply background blur effects"
    INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Save blurred photos to your photo library"
    INFOPLIST_KEY_NSUserTrackingUsageDescription: "BokeFocus uses your advertising identifier to show relevant ads that support the free version of this app. No personal data is shared."
    INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
    # GADApplicationIdentifier: set after AdMob app is fully activated in console
    # INFOPLIST_KEY_GADApplicationIdentifier: "ca-app-pub-9569882864362674~7393222785"

targets:
  BokeFocus:
    type: application
    platform: iOS
    sources:
      - path: BokeFocus
        type: group
        createIntermediateGroups: true
    # dependencies:
    #   - package: GoogleMobileAds
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.imaiissatsu.BokeFocus
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
